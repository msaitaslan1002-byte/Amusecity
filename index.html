<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEM CALINDI // ACCESS DENIED</title>
    <style>
        /* CSS TASARIM KODLARI */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.15;
        }

        .terminal-container {
            position: relative;
            z-index: 2;
            padding: 20px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
        }

        .warning-box {
            text-align: center;
            border: 2px solid #ff0000;
            padding: 15px;
            background: rgba(255, 0, 0, 0.1);
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .blink {
            animation: blinker 1s linear infinite;
            font-weight: bold;
            font-size: 1.4rem;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        .console-text {
            font-size: 18px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="matrix-bg">
        <canvas id="matrix"></canvas>
    </div>

    <div class="terminal-container">
        <div class="warning-box">
            <h1>[ KRİTİK UYARI ]</h1>
            <p class="blink">SİSTEMİNİZ BİZİM KONTROLÜMÜZDE</p>
        </div>
        
        <div class="console-text" id="console"></div>
    </div>

    <script>
        // JAVASCRIPT ARKA PLAN VE YAZI EFEKTLERİ
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // Korkutucu Hacker Terminal Yazıları
        const consoleElement = document.getElementById('console');
        const lines = [
            "> Hedef IP adresi başarıyla tespit edildi...",
            "> Port 80, 443 ve 8080 üzerinden sızma işlemi başladı.",
            "> Bypass firewall... BAŞARILI.",
            "> Sistem dosyalarına erişiliyor: C:/Windows/System32/...",
            "> Veri tabanı şifreleri kırılıyor... %25... %57... %100",
            "> Bütün kişisel veriler, fotoğraflar ve şifreler uzak sunucuya aktarılıyor...",
            "> UZAKTAN BAĞLANTI GÜVENLİ. KONTROL TAMAMLANDI.",
            "> NOT: Bu sistem artık tamamen bizim gözetimimiz altındadır.",
            "> Kaçamazsınız. Tarayıcıyı kapatsanız bile çok geç."
        ];

        let lineIndex = 0;
        function typeLines() {
            if (lineIndex < lines.length) {
                consoleElement.innerHTML += lines[lineIndex] + "<br><br>";
                lineIndex++;
                setTimeout(typeLines, 1500); // Satırlar arası bekleme süresi (1.5 saniye)
            }
        }
        setTimeout(typeLines, 1000);
    </script>
</body>
</html>
